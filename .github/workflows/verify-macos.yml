name: verify_macos_build

on:
  push:
    branches: [ claude/verify-macos-build ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies (Homebrew)
      run: brew install autoconf automake libtool pkg-config lzo lz4 zstd
    - name: autogen
      run: ./autogen.sh
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: show binary and version
      run: file ./lrzip && ./lrzip -V
    - name: make check
      run: make check

  build-macos-without-zstd:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies (Homebrew, no zstd)
      run: brew install autoconf automake libtool pkg-config lzo lz4
    - name: autogen
      run: ./autogen.sh
    - name: configure without zstd
      run: ./configure --without-zstd
    - name: make
      run: make
    - name: show binary and version
      run: file ./lrzip && ./lrzip -V

  build-ubuntu-sanity:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: sudo apt update && sudo apt install -y liblzo2-dev liblz4-dev libbz2-dev zlib1g-dev libzstd-dev
    - name: autogen
      run: ./autogen.sh
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check
